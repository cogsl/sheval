tests:
    - name: bsep1_shex
      data_graph: sa1.ttl
      shex_file: sa1.shex
      engine: shex
      description: Separation test for sa1 (ShEx)
      default_prefix: "http://example.org/"
      nodes:
        - ":a"
      shapes:
        - ":S"
      expected_results:
        lfp:
          models:
            - passing: []
              failing:
                - node: ":a"
                  shape: ":S"
        gfp:
          models:
            - passing:
                - node: ":a"
                  shape: ":S"
              failing: []
        brave:
          quantifier: any
          models: &bsep1_shex_sms_models
            - passing: []
              failing:
                - node: ":a"
                  shape: ":S"
            - passing:
                - node: ":a"
                  shape: ":S"
              failing: []
        cautious:
          quantifier: all
          models: *bsep1_shex_sms_models
