              failing:
                - node: ":a"
                  shape: ":User"
                - node: ":b"
                  shape: ":User"
            - passing:
                - node: ":a"
                  shape: ":User"
              failing: 
                - node: ":b"
                  shape: ":User"
            - passing:
                - node: ":b"
                  shape: ":User"
              failing: 
                - node: ":a"
                  shape: ":User"
            - passing:
                - node: ":a"
                  shape: ":User"
                - node: ":b"
                  shape: ":User"
              failing:  []
