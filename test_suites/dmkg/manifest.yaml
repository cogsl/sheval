rdf_folder: RDF
shacl_folder: SHACL
shex_technologies: 
  - rudof
  - shex_s
  - jena_shex
shacl_technologies: 
  - pyshacl
  - shacl_s
  - jena_shacl
  - shacl_tq
  - rudof
shex_folder: ShEx
results_folder: results
tests:
    - name: example
      data_graph: example_dmkg.ttl
      shex_file: example_dmkg.shex
      engine: shex
      description: Example from paper submitted to DMKG
      default_prefix: "http://example.org/"
      nodes:
        - ":a"
        - ":b"
      shapes: 
        - ":User"
      expected_results: &expected_results_dmkg
        lfp:
          models:
            - passing: []
              failing:
                - node: ":a"
                  shape: ":User"
                - node: ":b"
                  shape: ":User"
        gfp:
          models:
            - passing:
                - node: ":a"
                  shape: ":User"
                - node: ":b"
                  shape: ":User"
              failing: []
        brave:
          quantifier: any
          models: &dmkg_example_models
            - passing: []
              failing:
                - node: ":a"
                  shape: ":User"
                - node: ":b"
                  shape: ":User"
            - passing:
                - node: ":a"
                  shape: ":User"
              failing: 
                - node: ":b"
                  shape: ":User"
            - passing:
                - node: ":b"
                  shape: ":User"
              failing: 
                - node: ":a"
                  shape: ":User"
            - passing:
                - node: ":a"
                  shape: ":User"
                - node: ":b"
                  shape: ":User"
              failing:  []
        cautious:
          quantifier: all
          models: *dmkg_example_models
    - name: example
      data_graph: example_dmkg.ttl
      shapes_graph: example_dmkg.shapes.ttl
      engine: shacl
      description: Example from paper submitted to DMKG
      default_prefix: "http://example.org/"
      nodes:
        - ":a"
        - ":b"
      shapes: 
        - ":User"
      expected_results: *expected_results_dmkg
